<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: sans-serif; }
    .toolbar { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .toolbar-left { display: flex; gap: 8px; }
    .refresh-btn { font-size: 12px; padding: 7px 16px; border-radius: 999px; border: none; background: #b573ff; color: #fff; cursor: pointer; letter-spacing: 0.02em; }
    .refresh-btn:hover { opacity: 0.85; }
    .design-btn { font-size: 12px; padding: 7px 16px; border-radius: 999px; border: none; background: #f0ede8; color: #1a1816; cursor: pointer; letter-spacing: 0.02em; }
    .design-btn:hover { background: #e8e4de; }
    .design-btn.saving { background: #1a1816; color: #fff; }
    .credit-btn { font-size: 12px; padding: 7px 16px; border-radius: 999px; border: none; background: #1a1816; color: #fff; cursor: pointer; letter-spacing: 0.02em; text-decoration: none; display: inline-block; }
    .credit-btn:hover { opacity: 0.85; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .grid.design-mode { cursor: grab; }
    .cell { aspect-ratio: 3 / 4; background: #f0f0f0; overflow: hidden; cursor: pointer; position: relative; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; }
    .grid.design-mode .cell { cursor: grab; }
    .cell.dragging { opacity: 0.4; cursor: grabbing; }
    .cell.drag-over { box-shadow: inset 0 0 0 3px #b573ff; transform: scale(0.97); }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .cell:hover img { transform: scale(1.03); }
    .cell-canva { width: 100%; height: 100%; border: none; display: block; pointer-events: none; }
    .label-date { position: absolute; top: 8px; left: 8px; background: #1a1816; color: #fff; font-size: 13px; font-weight: 500; padding: 3px 10px; border-radius: 999px; opacity: 0; transition: opacity 0.2s; }
    .label-name { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.4); color: #fff; font-size: 15px; font-weight: 500; padding: 10px 12px; opacity: 0; transition: opacity 0.2s; line-height: 1.3; }
    .cell:hover .label-date { opacity: 1; }
    .cell:hover .label-name { opacity: 1; }
    .badge { position: absolute; top: 8px; right: 8px; background: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    .badge svg { width: 14px; height: 14px; }
    .design-banner { display: none; background: #f5f0ff; border-bottom: 1px solid #e0d4ff; padding: 8px 14px; font-size: 12px; color: #7c3aed; text-align: center; }
    .design-banner.visible { display: block; }
    .loading { padding: 2rem; text-align: center; color: #999; font-size: 14px; }
    .error { padding: 2rem; color: red; font-size: 14px; }
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox-media { position: relative; display: flex; align-items: center; justify-content: center; }
    .lightbox-img { max-width: 100%; max-height: 72vh; object-fit: contain; border-radius: 8px; display: block; }
    .lightbox-canva { width: 340px; height: 480px; border: none; border-radius: 8px; }
    .lightbox-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .lightbox-arrow:hover { background: rgba(255,255,255,0.35); }
    .lightbox-arrow.prev { left: -44px; }
    .lightbox-arrow.next { right: -44px; }
    .lightbox-arrow.hidden { opacity: 0; pointer-events: none; }
    .lightbox-dots { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
    .lightbox-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: background 0.15s; }
    .lightbox-dot.active { background: #fff; }
    .lightbox-name { color: #fff; font-size: 14px; margin-top: 12px; text-align: center; max-width: 80%; line-height: 1.4; }
    .lightbox-date { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }
    .lightbox-close { position: absolute; top: 14px; right: 18px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; background: none; border: none; }
    .lightbox-notion { margin-top: 14px; font-size: 12px; padding: 6px 16px; border-radius: 999px; background: #fff; color: #1a1816; text-decoration: none; font-weight: 500; }
    .lightbox-notion:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="design-banner" id="design-banner">✦ design mode — drag posts to rearrange, then hit save changes</div>
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="refresh-btn" id="btn" onclick="loadGrid()">refresh</button>
      <button class="design-btn" id="design-btn" onclick="toggleDesignMode()">design grid</button>
    </div>
    <a class="credit-btn" href="https://www.etsy.com/shop/jddesignonline" target="_blank">widget by jddesignonline</a>
  </div>
  <div class="grid" id="grid"><div class="loading">loading...</div></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div class="lightbox-media">
      <button class="lightbox-arrow prev hidden" id="lb-prev" onclick="event.stopPropagation();changeSlide(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <img class="lightbox-img" id="lightbox-img" src="" alt="" style="display:none;" />
      <iframe class="lightbox-canva" id="lightbox-canva" src="" style="display:none;" allowfullscreen></iframe>
      <button class="lightbox-arrow next hidden" id="lb-next" onclick="event.stopPropagation();changeSlide(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="lightbox-dots" id="lb-dots"></div>
    <div class="lightbox-name" id="lightbox-name"></div>
    <div class="lightbox-date" id="lightbox-date"></div>
    <a class="lightbox-notion" id="lightbox-notion" href="" target="_blank">open in notion</a>
  </div>

  <script>
    let currentImgs = [];
    let currentIdx = 0;
    let designMode = false;
    let allPosts = [];
    let dragSrcIdx = null;

    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
    }

    function canvaEmbedUrl(url) {
      if (!url) return '';
      url = url.replace('/view', '/watch');
      if (!url.includes('?embed')) url = url.replace(/\?.*$/, '') + '?embed';
      return url;
    }

    function pinSVG() {
      return `<svg viewBox="0 0 24 24" fill="#1a1816" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="7" r="5"/>
        <ellipse cx="12" cy="6" rx="2" ry="1.2" fill="#fff" opacity="0.4"/>
        <rect x="11" y="12" width="2" height="7" rx="1"/>
      </svg>`;
    }

    function carouselSVG() {
      return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="14" height="14" rx="3" stroke="#1a1816" stroke-width="2"/>
        <path d="M7 19h11a3 3 0 0 0 3-3V8" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      </svg>`;
    }

    function toggleDesignMode() {
      if (designMode) {
        saveChanges();
      } else {
        designMode = true;
        document.getElementById('design-btn').textContent = 'save changes';
        document.getElementById('design-btn').classList.add('saving');
        document.getElementById('design-banner').classList.add('visible');
        document.getElementById('btn').disabled = true;
        document.getElementById('grid').classList.add('design-mode');
        enableDrag();
      }
    }

    function exitDesignMode() {
      designMode = false;
      document.getElementById('design-btn').textContent = 'design grid';
      document.getElementById('design-btn').classList.remove('saving');
      document.getElementById('design-banner').classList.remove('visible');
      document.getElementById('btn').disabled = false;
      document.getElementById('grid').classList.remove('design-mode');
    }

    function enableDrag() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.draggable = true;
        cell.addEventListener('dragstart', e => {
          dragSrcIdx = i;
          setTimeout(() => cell.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        cell.addEventListener('dragend', () => {
          cell.classList.remove('dragging');
          document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over'));
        });
        cell.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          document.querySelectorAll('.cell').forEach(c => c.classList.remove('drag-over'));
          cell.classList.add('drag-over');
        });
        cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
        cell.addEventListener('drop', e => {
          e.preventDefault();
          cell.classList.remove('drag-over');
          if (dragSrcIdx === null || dragSrcIdx === i) return;
          const moved = allPosts.splice(dragSrcIdx, 1)[0];
          allPosts.splice(i, 0, moved);
          dragSrcIdx = null;
          renderPosts(allPosts);
          enableDrag();
        });
      });
    }

    async function saveChanges() {
      const btn = document.getElementById('design-btn');
      btn.textContent = 'saving...';
      btn.disabled = true;

      // collect original dates in current visual order
      const dates = [...allPosts].map(p => p.date);
      const updates = allPosts.map((p, i) => ({ id: p.id, date: dates[i] }));

      try {
        await fetch('/api/notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'update-dates', updates })
        });
        exitDesignMode();
        loadGrid();
      } catch(e) {
        btn.textContent = 'save changes';
        btn.disabled = false;
        alert('save failed — please try again');
      }
    }

    function updateSlide() {
      const img = currentImgs[currentIdx];
      document.getElementById('lightbox-img').src = img;
      document.getElementById('lb-prev').classList.toggle('hidden', currentIdx === 0);
      document.getElementById('lb-next').classList.toggle('hidden', currentIdx === currentImgs.length - 1);
      document.querySelectorAll('.lightbox-dot').forEach((d, i) => d.classList.toggle('active', i === currentIdx));
    }

    function changeSlide(dir) {
      currentIdx = Math.max(0, Math.min(currentImgs.length - 1, currentIdx + dir));
      updateSlide();
    }

    function openLightbox(p) {
      if (designMode) return;
      const imgEl = document.getElementById('lightbox-img');
      const canvaEl = document.getElementById('lightbox-canva');
      const dotsEl = document.getElementById('lb-dots');

      if (p.imageSource === 'canva' && p.img) {
        imgEl.style.display = 'none';
        canvaEl.src = canvaEmbedUrl(p.img);
        canvaEl.style.display = 'block';
        currentImgs = [];
        dotsEl.innerHTML = '';
      } else {
        canvaEl.style.display = 'none';
        canvaEl.src = '';
        imgEl.style.display = 'block';
        currentImgs = p.imgs && p.imgs.length ? p.imgs : (p.img ? [p.img] : []);
        currentIdx = 0;
        dotsEl.innerHTML = currentImgs.length > 1
          ? currentImgs.map((_, i) => `<div class="lightbox-dot${i === 0 ? ' active' : ''}"></div>`).join('')
          : '';
        updateSlide();
      }

      document.getElementById('lightbox-name').textContent = p.name || '';
      document.getElementById('lightbox-date').textContent = formatDate(p.date);
      document.getElementById('lightbox-notion').href = 'https://notion.so/' + p.id.replace(/-/g, '');
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox(e) {
      if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightbox-canva').src = '';
      }
    }

    function renderPosts(posts) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      posts.forEach(p => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => openLightbox(p);

        if (p.imageSource === 'canva' && p.img) {
          const iframe = document.createElement('iframe');
          iframe.src = canvaEmbedUrl(p.img);
          iframe.className = 'cell-canva';
          iframe.allowFullscreen = true;
          cell.appendChild(iframe);
        } else if (p.img) {
          const img = document.createElement('img');
          img.src = p.img;
          img.alt = '';
          cell.appendChild(img);
        }

        if (p.pinned || p.format === 'carousel') {
          const badge = document.createElement('div');
          badge.className = 'badge';
          badge.innerHTML = p.pinned ? pinSVG() : carouselSVG();
          cell.appendChild(badge);
        }

        const dateEl = document.createElement('div');
        dateEl.className = 'label-date';
        dateEl.textContent = formatDate(p.date);
        cell.appendChild(dateEl);

        const nameEl = document.createElement('div');
        nameEl.className = 'label-name';
        nameEl.textContent = p.name;
        cell.appendChild(nameEl);

        grid.appendChild(cell);
      });
    }

    function loadGrid() {
      const btn = document.getElementById('btn');
      btn.textContent = 'loading...';
      btn.disabled = true;
      document.getElementById('grid').innerHTML = '<div class="loading">loading...</div>';
      fetch('/api/notion', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
        .then(r => r.json())
        .then(data => {
          btn.textContent = 'refresh';
          btn.disabled = false;
          if (data.error) {
            document.getElementById('grid').innerHTML = '<div class="error">' + data.error + ' (' + data.code + ')</div>';
            return;
          }
          allPosts = data.posts;
          renderPosts(allPosts);
        })
        .catch(e => {
          btn.textContent = 'refresh';
          btn.disabled = false;
          document.getElementById('grid').innerHTML = '<div class="error">' + e.message + '</div>';
        });
    }
    loadGrid();
  </script>
</body>
</html>
