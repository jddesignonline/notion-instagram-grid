<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: sans-serif; }
    .toolbar { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
    .refresh-btn { font-size: 13px; padding: 8px 20px; border-radius: 999px; border: none; background: #b573ff; color: #fff; cursor: pointer; letter-spacing: 0.02em; }
    .refresh-btn:hover { opacity: 0.85; }
    .credit-btn { font-size: 13px; padding: 8px 20px; border-radius: 999px; border: none; background: #1a1816; color: #fff; cursor: pointer; letter-spacing: 0.02em; text-decoration: none; display: inline-block; }
    .credit-btn:hover { opacity: 0.85; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .cell { aspect-ratio: 3 / 4; background: #f0f0f0; overflow: hidden; cursor: pointer; position: relative; }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .cell:hover img { transform: scale(1.03); }
    .label-date { position: absolute; top: 8px; left: 8px; background: #1a1816; color: #fff; font-size: 12px; font-weight: 500; padding: 3px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; }
    .label-name { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; color: #1a1816; font-size: 13px; font-weight: 500; padding: 8px 10px; opacity: 0; transition: opacity 0.2s; line-height: 1.3; }
    .cell:hover .label-date { opacity: 1; }
    .cell:hover .label-name { opacity: 1; }
    .pin { position: absolute; top: 8px; right: 8px; background: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .pin svg { width: 13px; height: 13px; fill: #1a1816; }
    .loading { padding: 2rem; text-align: center; color: #999; font-size: 14px; }
    .error { padding: 2rem; color: red; font-size: 14px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="refresh-btn" id="btn" onclick="loadGrid()">refresh</button>
    <a class="credit-btn" href="https://www.etsy.com/shop/jddesignonline" target="_blank">widget by jddesignonline</a>
  </div>
  <div class="grid" id="grid"><div class="loading">loading...</div></div>
  <script>
    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
    }

    function renderPosts(posts) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      posts.forEach(p => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => window.open('https://notion.so/' + p.id.replace(/-/g, ''), '_blank');

        if (p.img) {
          const img = document.createElement('img');
          img.src = p.img;
          img.alt = '';
          cell.appendChild(img);
        }

        if (p.pinned) {
          const pin = document.createElement('div');
          pin.className = 'pin';
          pin.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 3a1 1 0 0 1 .7 1.7l-1.1 1.1 1.7 5.2-2.3.7V15l-3-1.5L9 15v-3.3l-2.3-.7 1.7-5.2L7.3 4.7A1 1 0 0 1 8 3h8zM12 17l1 4h-2l1-4z"/></svg>';
          cell.appendChild(pin);
        }

        const dateEl = document.createElement('div');
        dateEl.className = 'label-date';
        dateEl.textContent = formatDate(p.date);
        cell.appendChild(dateEl);

        const nameEl = document.createElement('div');
        nameEl.className = 'label-name';
        nameEl.textContent = p.name;
        cell.appendChild(nameEl);

        grid.appendChild(cell);
      });
    }

    function loadGrid() {
      const btn = document.getElementById('btn');
      btn.textContent = 'loading...';
      btn.disabled = true;
      document.getElementById('grid').innerHTML = '<div class="loading">loading...</div>';
      fetch('/api/notion', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
        .then(r => r.json())
        .then(data => {
          btn.textContent = 'refresh';
          btn.disabled = false;
          if (data.error) {
            document.getElementById('grid').innerHTML = '<div class="error">' + data.error + ' (' + data.code + ')</div>';
            return;
          }
          renderPosts(data.posts);
        })
        .catch(e => {
          btn.textContent = 'refresh';
          btn.disabled = false;
          document.getElementById('grid').innerHTML = '<div class="error">' + e.message + '</div>';
        });
    }
    loadGrid();
  </script>
</body>
</html>
