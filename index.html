<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: sans-serif; }
    .toolbar { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
    .refresh-btn { font-size: 16px; padding: 10px 22px; border-radius: 999px; border: none; background: #b573ff; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .refresh-btn:hover { opacity: 0.85; }
    .credit { font-size: 14px; color: #999; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .cell { aspect-ratio: 3 / 4; background: #f0f0f0; overflow: hidden; cursor: pointer; position: relative; }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .cell:hover img { transform: scale(1.03); }
    .label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.55); color: #fff; padding: 10px; opacity: 0; transition: opacity 0.2s; }
    .cell:hover .label { opacity: 1; }
    .label-date { font-size: 13px; color: rgba(255,255,255,0.85); }
    .loading { padding: 2rem; text-align: center; color: #999; font-size: 14px; }
    .error { padding: 2rem; color: red; font-size: 14px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="refresh-btn" id="btn" onclick="loadGrid()">↻ refresh</button>
    <span class="credit">widget by jddesignonline</span>
  </div>
  <div class="grid" id="grid"><div class="loading">loading...</div></div>
  <script>
    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-NZ', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderPosts(posts) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      posts.forEach(p => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => window.open('https://notion.so/' + p.id.replace(/-/g, ''), '_blank');

        if (p.img) {
          const img = document.createElement('img');
          img.src = p.img;
          img.alt = '';
          cell.appendChild(img);
        }

        const label = document.createElement('div');
        label.className = 'label';

        const dateEl = document.createElement('div');
        dateEl.className = 'label-date';
        dateEl.textContent = formatDate(p.date);

        label.appendChild(dateEl);
        cell.appendChild(label);
        grid.appendChild(cell);
      });
    }

    function loadGrid() {
      const btn = document.getElementById('btn');
      btn.textContent = 'loading...';
      btn.disabled = true;
      document.getElementById('grid').innerHTML = '<div class="loading">loading...</div>';
      fetch('/api/notion', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
        .then(r => r.json())
        .then(data => {
          btn.innerHTML = '↻ refresh';
          btn.disabled = false;
          if (data.error) {
            document.getElementById('grid').innerHTML = '<div class="error">' + data.error + ' (' + data.code + ')</div>';
            return;
          }
          renderPosts(data.posts);
        })
        .catch(e => {
          btn.innerHTML = '↻ refresh';
          btn.disabled = false;
          document.getElementById('grid').innerHTML = '<div class="error">' + e.message + '</div>';
        });
    }
    loadGrid();
  </script>
</body>
</html>
